<!-- ===== TRY ROSETTA DRAWER ===== -->
<button class="try-rosetta-fab" id="try-fab" aria-label="Try Rosetta demo">Try Rosetta</button>
<div class="try-drawer-overlay" id="try-overlay"></div>
<div class="try-drawer" id="try-drawer" role="dialog" aria-modal="true" aria-label="Try Rosetta demo">
  <div class="try-drawer-header">
    <div>
      <div class="try-drawer-title">Try Rosetta</div>
      <div class="try-drawer-subtitle">See how Rosetta handles real tasks</div>
    </div>
    <button class="try-drawer-close" id="try-close" aria-label="Close">&times;</button>
  </div>
  <div class="try-drawer-body">
    <div class="try-scenarios" id="try-scenarios"></div>
    <div class="try-chat" id="try-chat"></div>
  </div>
</div>

<script>
(function(){
  var scenarios = [
    // ── FREE WORKFLOWS ──
    {
      title: 'What can Rosetta do?',
      tag: 'Self-help',
      paid: false,
      messages: [
        { role: 'user', text: 'What workflows are available? How do I use Rosetta?' },
        { role: 'rosetta', text: '<strong>Mode: help</strong> — Here\'s what I can do for you:' },
        { role: 'rosetta', text: '<strong>Free workflows:</strong><br>• <strong>Coding</strong> — full implementation with plan & approval<br>• <strong>Init</strong> — project setup & context generation<br>• <strong>Requirements</strong> — user stories & specs<br>• <strong>Ad-hoc</strong> — quick tasks<br>• <strong>Self-help</strong> — this guide' },
        { role: 'rosetta', text: '<strong>Pro workflows:</strong><br>• Research, Discovery, Code Analysis<br>• Testing, Validation, AQA<br>• Modernization, Data, External Libraries<br>• Context Engineering, Use Cases<br><br><a href="mailto:rosetta-support@griddynamics.com">Contact us</a> for Pro access.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Set up a new project',
      tag: 'Init',
      paid: false,
      messages: [
        { role: 'user', text: 'Initialize Rosetta for our notification microservice.' },
        { role: 'rosetta', text: '<strong>Mode: init</strong> — Loading initialization workflow...' },
        { role: 'rosetta', text: '<strong>Quick analysis:</strong> Scanned your repo — detected Go 1.22, gRPC, PostgreSQL, Docker. Monorepo structure under <code>services/</code>.' },
        { role: 'rosetta', text: '<strong>Documentation:</strong> Generated:<br>• <code>CONTEXT.md</code> — project overview<br>• <code>TECHSTACK.md</code> — dependencies & versions<br>• <code>ARCHITECTURE.md</code> — system structure<br>• <code>CODEMAP.md</code> — file map with descriptions' },
        { role: 'rosetta', text: '<strong>Verification:</strong> All files validated against your codebase. Your AI agent is now project-aware from the first prompt.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Write user story for notifications',
      tag: 'Requirements',
      paid: false,
      messages: [
        { role: 'user', text: 'Write a user story for email notification preferences.' },
        { role: 'rosetta', text: '<strong>Mode: requirements</strong> — Loading requirements workflow...' },
        { role: 'rosetta', text: '<strong>Discovery:</strong> Found existing notification module in <code>ARCHITECTURE.md</code>. Identified 3 related user stories in <code>docs/requirements/</code>.' },
        { role: 'rosetta', text: '<strong>Research:</strong> Queried knowledge base for requirements conventions — your team uses Given/When/Then format with acceptance criteria matrix.' },
        { role: 'rosetta', text: '<strong>Draft:</strong> Created user story with acceptance criteria, edge cases, and dependency mapping. Linked to existing auth and notification modules.<br><br><em>Waiting for your review.</em>' },
        { role: 'rosetta', text: '<strong>Deliver:</strong> After approval — saved to <code>docs/requirements/notification-preferences.md</code> with full traceability.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Add password reset feature',
      tag: 'Coding',
      paid: false,
      messages: [
        { role: 'user', text: 'Add password reset functionality to our auth module.' },
        { role: 'rosetta', text: '<strong>Mode: coding</strong> — Loading workflow, guardrails, and project context...' },
        { role: 'rosetta', text: '<strong>Prepare:</strong> Loaded <code>guardrails.md</code>, <code>coding.md</code>. Read your <code>ARCHITECTURE.md</code> and <code>TECHSTACK.md</code> — found existing auth module at <code>src/auth/</code>, uses JWT + bcrypt.' },
        { role: 'rosetta', text: '<strong>Research:</strong> Queried knowledge base — found your team\'s security conventions: token expiry 15 min, rate limiting required, email service via SendGrid.' },
        { role: 'rosetta', text: '<strong>Plan:</strong><br>1. Add <code>POST /auth/forgot-password</code><br>2. Add <code>POST /auth/reset-password</code><br>3. Create token store with 15 min expiry<br>4. Wire SendGrid email template<br>5. Add rate limiting (3 req/min)<br><br><em>Waiting for your approval before coding.</em>' },
        { role: 'rosetta', text: '<strong>Act:</strong> After approval — implements exactly per plan, validates against your coding conventions, runs your test suite.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Quick task — rename a variable',
      tag: 'Ad-hoc',
      paid: false,
      messages: [
        { role: 'user', text: 'Rename userList to activeUsers across the project.' },
        { role: 'rosetta', text: '<strong>Mode: ad-hoc</strong> — Small task, executing with project context...' },
        { role: 'rosetta', text: '<strong>Context:</strong> Loaded your coding conventions — camelCase naming, no abbreviations. Found 12 occurrences of <code>userList</code> across 5 files.' },
        { role: 'rosetta', text: '<strong>Done:</strong> Renamed all 12 occurrences to <code>activeUsers</code>. Updated imports and references. No tests broken.' },
        { role: 'cta', text: '' }
      ]
    },
    // ── PAID WORKFLOWS ──
    {
      title: 'Deep research on architecture options',
      tag: 'Research',
      paid: true,
      messages: [
        { role: 'user', text: 'Research options for migrating our message queue from RabbitMQ to something more scalable.' },
        { role: 'rosetta', text: '<strong>Mode: research</strong> — Loading research workflow with meta-prompting...' },
        { role: 'rosetta', text: '<strong>Prepare:</strong> Read <code>TECHSTACK.md</code> — current stack: RabbitMQ 3.12, 15 consumers, ~50k msg/day. Read <code>ARCHITECTURE.md</code> for integration points.' },
        { role: 'rosetta', text: '<strong>Deep research:</strong> Analyzed 3 options against your constraints:<br>• <strong>Kafka</strong> — best throughput, but operational overhead<br>• <strong>NATS JetStream</strong> — lightweight, fits your Go stack<br>• <strong>AWS SQS/SNS</strong> — managed, but vendor lock-in<br><br>Each option scored on: throughput, ops complexity, migration effort, cost.' },
        { role: 'rosetta', text: '<strong>Output:</strong> Comparative analysis saved to <code>docs/research/mq-migration.md</code> with decision matrix, migration risk assessment, and recommended approach.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Analyze codebase and trace flows',
      tag: 'Analysis',
      paid: true,
      messages: [
        { role: 'user', text: 'Explain how the payment processing works end-to-end.' },
        { role: 'rosetta', text: '<strong>Mode: analysis</strong> — Loading code analysis workflow...' },
        { role: 'rosetta', text: '<strong>Prepare:</strong> Read <code>CODEMAP.md</code> — identified payment-related files across 6 directories. No guessing file paths.' },
        { role: 'rosetta', text: '<strong>Trace:</strong> Followed the real payment flow through your code:<br><code>CheckoutController \u2192 PaymentService \u2192 StripeGateway \u2192 OrderRepository \u2192 NotificationService</code><br><br>Found 3 middleware layers, 2 retry mechanisms, and 1 dead-letter queue.' },
        { role: 'rosetta', text: '<strong>Output:</strong> Generated Mermaid sequence diagram, documented every error path, listed all webhook handlers. Saved to <code>docs/PAYMENT_ANALYSIS.md</code>.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Generate end-to-end test suite',
      tag: 'AQA',
      paid: true,
      messages: [
        { role: 'user', text: 'Create an E2E test suite for the checkout flow.' },
        { role: 'rosetta', text: '<strong>Mode: aqa</strong> — Loading automated QA workflow (6 phases)...' },
        { role: 'rosetta', text: '<strong>Discovery:</strong> Analyzed checkout flow — 4 pages, 12 API calls, 3 payment methods. Read your testing conventions from knowledge base: Playwright, Page Object pattern, test data factories.' },
        { role: 'rosetta', text: '<strong>Test plan:</strong><br>• 8 happy-path scenarios<br>• 5 error scenarios (card declined, timeout, invalid input)<br>• 3 edge cases (currency conversion, promo codes, guest checkout)<br><br><em>Waiting for approval.</em>' },
        { role: 'rosetta', text: '<strong>Generate:</strong> After approval — creates test files following your Page Object structure, adds fixtures, wires into CI pipeline. All tests validated against your actual selectors.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Migrate from monolith to microservices',
      tag: 'Modernization',
      paid: true,
      messages: [
        { role: 'user', text: 'Help us extract the billing module into a separate service.' },
        { role: 'rosetta', text: '<strong>Mode: modernization</strong> — Loading modernization workflow (7 phases)...' },
        { role: 'rosetta', text: '<strong>Assessment:</strong> Scanned billing module — 34 files, 12 database tables, 8 API consumers. Identified 5 coupling points with the monolith.' },
        { role: 'rosetta', text: '<strong>Strategy:</strong> Recommended strangler fig pattern:<br>1. Extract billing domain models<br>2. Create billing API facade<br>3. Migrate consumers one by one<br>4. Split database with dual-write period<br>5. Cut over and decommission old code' },
        { role: 'rosetta', text: '<strong>Plan:</strong> Generated migration plan with dependency graph, risk matrix, rollback strategy, and estimated blast radius for each phase.<br><br><em>Waiting for approval.</em>' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Onboard an external library',
      tag: 'External Library',
      paid: true,
      messages: [
        { role: 'user', text: 'Integrate Stripe SDK v5 into our payment module.' },
        { role: 'rosetta', text: '<strong>Mode: external-lib</strong> — Loading library onboarding workflow (4 phases)...' },
        { role: 'rosetta', text: '<strong>Evaluate:</strong> Checked Stripe SDK v5 against your <code>TECHSTACK.md</code> — compatible with Node 20, no conflicting dependencies. Reviewed changelog for breaking changes from v4.' },
        { role: 'rosetta', text: '<strong>Plan:</strong> Integration steps:<br>1. Update <code>package.json</code> + lock file<br>2. Migrate deprecated API calls (3 found)<br>3. Update webhook signature verification<br>4. Add new TypeScript types<br><br>Updated <code>DEPENDENCIES.md</code> with rationale.' },
        { role: 'rosetta', text: '<strong>Validate:</strong> All existing payment tests pass. Added integration test for new webhook format. No security advisories found.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Run validation & testing workflows',
      tag: 'Testing & Validation',
      paid: true,
      messages: [
        { role: 'user', text: 'Validate the auth module against our coding standards.' },
        { role: 'rosetta', text: '<strong>Mode: validation</strong> — Loading validation workflow...' },
        { role: 'rosetta', text: '<strong>Scan:</strong> Checked 18 files in <code>src/auth/</code> against your coding conventions and guardrails.' },
        { role: 'rosetta', text: '<strong>Findings:</strong><br>• 2 functions missing error handling \u2717<br>• 1 hardcoded timeout (should use config) \u2717<br>• JWT secret loaded from env \u2713<br>• All endpoints have rate limiting \u2713<br>• Input validation on all routes \u2713' },
        { role: 'rosetta', text: '<strong>Report:</strong> Validation report with 2 issues (auto-fixable), 14 passing checks. Generated fix suggestions grounded in your codebase patterns.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Context engineering for your project',
      tag: 'Context Engineering',
      paid: true,
      messages: [
        { role: 'user', text: 'Our project context is outdated. Rebuild it.' },
        { role: 'rosetta', text: '<strong>Mode: context-engineering</strong> — Loading context engineering workflow...' },
        { role: 'rosetta', text: '<strong>Audit:</strong> Compared existing <code>CONTEXT.md</code>, <code>ARCHITECTURE.md</code>, <code>TECHSTACK.md</code> against actual codebase. Found 12 drift points — 3 new services undocumented, 2 deprecated deps still listed.' },
        { role: 'rosetta', text: '<strong>Rebuild:</strong> Regenerated all context files from source code analysis:<br>• Updated dependency versions<br>• Added missing service descriptions<br>• Rebuilt code map with new modules<br>• Refreshed architecture diagram' },
        { role: 'rosetta', text: '<strong>Verify:</strong> All context files validated against live codebase. Zero drift. Your AI agents now have accurate, up-to-date project understanding.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Discovery & use case mapping',
      tag: 'Discovery & Use Cases',
      paid: true,
      messages: [
        { role: 'user', text: 'Map all use cases for the notification system.' },
        { role: 'rosetta', text: '<strong>Mode: discovery</strong> — Loading discovery workflow...' },
        { role: 'rosetta', text: '<strong>Scan:</strong> Analyzed notification module — found 4 channels (email, SMS, push, in-app), 11 event triggers, 3 user preference settings.' },
        { role: 'rosetta', text: '<strong>Use case map:</strong><br>• 11 trigger-based notifications (order, auth, system)<br>• 4 delivery channels with fallback chains<br>• 3 user preference scenarios (opt-in, opt-out, digest)<br>• 2 admin use cases (broadcast, template management)' },
        { role: 'rosetta', text: '<strong>Output:</strong> Use case matrix with actor mapping, priority scoring, and dependency graph. Saved to <code>docs/discovery/notifications.md</code>.' },
        { role: 'cta', text: '' }
      ]
    }
  ];

  /* Expose scenarios globally */
  window.__tryRosettaScenarios = scenarios;

  /* Trigger event for inline section that may already be waiting */
  document.dispatchEvent(new CustomEvent('tryRosettaReady'));

  var fab = document.getElementById('try-fab');
  var overlay = document.getElementById('try-overlay');
  var drawer = document.getElementById('try-drawer');
  var closeBtn = document.getElementById('try-close');
  var scenariosEl = document.getElementById('try-scenarios');
  var chatEl = document.getElementById('try-chat');

  function openDrawer() {
    drawer.classList.add('is-open');
    overlay.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    drawer.classList.remove('is-open');
    overlay.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(function() { showScenarios(); }, 350);
  }

  function showScenarios() {
    chatEl.classList.remove('is-active');
    scenariosEl.style.display = '';
    scenariosEl.innerHTML = '';

    var freeLabel = document.createElement('div');
    freeLabel.className = 'try-section-label';
    freeLabel.textContent = 'Free';
    scenariosEl.appendChild(freeLabel);

    scenarios.filter(function(s) { return !s.paid; }).forEach(function(s) {
      var idx = scenarios.indexOf(s);
      var card = document.createElement('div');
      card.className = 'try-scenario-card';
      card.innerHTML = '<div class="try-scenario-tag">' + s.tag + '</div><div class="try-scenario-title">' + s.title + '</div>';
      card.addEventListener('click', function() { playScenario(idx); });
      scenariosEl.appendChild(card);
    });

    var proLabel = document.createElement('div');
    proLabel.className = 'try-section-label try-section-label--pro';
    proLabel.textContent = 'Pro';
    scenariosEl.appendChild(proLabel);

    scenarios.filter(function(s) { return s.paid; }).forEach(function(s) {
      var idx = scenarios.indexOf(s);
      var card = document.createElement('div');
      card.className = 'try-scenario-card try-scenario-card--pro';
      card.innerHTML = '<div class="try-scenario-tag">' + s.tag + '</div><div class="try-scenario-title">' + s.title + '</div><div class="try-scenario-pro-badge">Pro</div>';
      card.addEventListener('click', function() { playScenario(idx); });
      scenariosEl.appendChild(card);
    });
  }

  var drawerSession = 0;

  function playScenario(idx) {
    var s = scenarios[idx];
    var session = ++drawerSession;
    scenariosEl.style.display = 'none';
    chatEl.innerHTML = '';
    chatEl.classList.add('is-active');

    var backBtn = document.createElement('button');
    backBtn.className = 'try-chat-back';
    backBtn.textContent = '\u2190 Back to scenarios';
    backBtn.addEventListener('click', showScenarios);
    chatEl.appendChild(backBtn);

    var proTeaserLimit = 2;

    var delay = 0;
    s.messages.forEach(function(msg, mi) {
      if (s.paid && msg.role === 'cta') return;

      delay += mi === 0 ? 300 : 1200;

      if (s.paid && mi === proTeaserLimit) {
        setTimeout(function() {
          if (session !== drawerSession) return;
          var typing = chatEl.querySelector('.try-typing');
          if (typing) typing.remove();

          var blurWrap = document.createElement('div');
          blurWrap.className = 'try-pro-blur-wrap';

          for (var bi = proTeaserLimit; bi < s.messages.length; bi++) {
            if (s.messages[bi].role === 'cta') continue;
            var blurMsg = document.createElement('div');
            blurMsg.className = 'try-msg try-msg--' + s.messages[bi].role + ' try-msg--blurred';
            blurMsg.innerHTML = s.messages[bi].text;
            blurWrap.appendChild(blurMsg);
          }

          var unlock = document.createElement('div');
          unlock.className = 'try-pro-unlock';
          unlock.innerHTML = '<div class="try-pro-unlock-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 118 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>' +
            '<h4>Unlock full workflow</h4>' +
            '<p>See how Rosetta handles this end-to-end with your codebase context.</p>' +
            '<a href="mailto:rosetta-support@griddynamics.com" class="try-pro-unlock-btn">Contact Us \u2192</a>';
          blurWrap.appendChild(unlock);

          chatEl.appendChild(blurWrap);
          chatEl.scrollTop = chatEl.scrollHeight;
        }, delay);
        return;
      }

      if (s.paid && mi > proTeaserLimit) return;

      setTimeout(function() {
        if (session !== drawerSession) return;
        var typing = chatEl.querySelector('.try-typing');
        if (typing) typing.remove();

        var el = document.createElement('div');
        if (msg.role === 'cta') {
          el.className = 'try-msg try-msg--cta';
          el.innerHTML = '<a href="{{ "/" | relative_url }}#try-rosetta-section">Ready to try it yourself? \u2192 Get Started</a>';
          el.querySelector('a').addEventListener('click', function() { closeDrawer(); });
        } else {
          el.className = 'try-msg try-msg--' + msg.role;
          el.innerHTML = msg.text;
        }
        chatEl.appendChild(el);
        chatEl.scrollTop = chatEl.scrollHeight;

        var nextIdx = mi + 1;
        var showTyping = false;
        if (!s.paid && nextIdx < s.messages.length && s.messages[nextIdx].role !== 'cta') {
          showTyping = true;
        } else if (s.paid && nextIdx < proTeaserLimit && nextIdx < s.messages.length) {
          showTyping = true;
        } else if (s.paid && nextIdx === proTeaserLimit) {
          showTyping = true;
        }
        if (showTyping) {
          setTimeout(function() {
            if (session !== drawerSession) return;
            var dots = document.createElement('div');
            dots.className = 'try-typing';
            dots.innerHTML = '<span></span><span></span><span></span>';
            chatEl.appendChild(dots);
            chatEl.scrollTop = chatEl.scrollHeight;
          }, 400);
        }
      }, delay);
    });
  }

  showScenarios();
  fab.addEventListener('click', openDrawer);
  overlay.addEventListener('click', closeDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && drawer.classList.contains('is-open')) closeDrawer();
  });
})();
</script>
