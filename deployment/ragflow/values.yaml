# Production values for RAGFlow Helm Chart
# Domain: https://ims.example.com/
# ⚠️  REPLACE ALL <PLACEHOLDER> VALUES BEFORE DEPLOYMENT


# Global image pull secrets configuration
global:
  # Global image repo prefix to render all images from a mirror/registry.
  # Example: "registry.example.com/myproj"
  # When set, template will replace the registry part of each image and keep the path.
  # Leave empty to use per-image repositories as-is.
  repo: ""
  # Global image pull secrets for all pods
  imagePullSecrets: []


# For detailed configuration options, see:
# https://ragflow.io/docs/configurations
env:
  # The type of doc engine to use
  DOC_ENGINE: elasticsearch
  # The version of Elasticsearch
  STACK_VERSION: "8.11.3"
  
  # Note: ELASTIC_PASSWORD is provided via external secret ragflow-elasticsearch-secret
  # Note: MYSQL_PASSWORD is provided via external secret ragflow-mysql-secret  
  # The database of the MySQL service to use
  # MYSQL_DBNAME: rag_flow
  # External MySQL host (only required when mysql.enabled=false)
  # MYSQL_HOST: ""
  # External MySQL port (defaults to 3306 if not set)
  # MYSQL_PORT: "3306"
  # External MySQL user (only when mysql.enabled=false), default is root if omitted
  # MYSQL_USER: "root"

  # Note: MINIO_PASSWORD is provided via external secret ragflow-minio-secret
  # External MinIO host
  # MINIO_HOST: ""
  # External MinIO port (defaults to 9000 if not set)
  # MINIO_PORT: "9000"

  # Note: REDIS_PASSWORD is provided via external secret redis-secret
  # External Redis host (only required when redis.enabled=false)
  # REDIS_HOST: ""
  # External Redis port (defaults to 6379 if not set)
  # REDIS_PORT: "6379"

  # The local time zone
  TZ: "Europe/London"                             
  # Uncomment the following line if you have limited access to huggingface.co:
  # HF_ENDPOINT: https://hf-mirror.com

  # The maximum file size for each uploaded file, in bytes.
  # You can uncomment this line and update the value if you wish to change 128M file size limit
  # MAX_CONTENT_LENGTH: "134217728"
  # After making the change, ensure you update `client_max_body_size` in nginx/nginx.conf correspondingly.

  # The number of document chunks processed in a single batch during document parsing.
  DOC_BULK_SIZE: 4

  # Text chunks processed in single batch during embedding vectorization
  EMBEDDING_BATCH_SIZE: 16

ragflow:
  image:
    repository: infiniflow/ragflow
    tag: v0.23.1
    pullPolicy: IfNotPresent
    pullSecrets: []
  # Optional service configuration overrides
  # to be written to local.service_conf.yaml
  # inside the RAGFlow container
  # https://ragflow.io/docs/dev/configurations#service-configuration
  service_conf:

  # Optional yaml formatted override for the
  # llm_factories.json file inside the RAGFlow
  # container.
  llm_factories:
    # factory_llm_infos:
    # - name: OpenAI-API-Compatible
    #   logo: ""
    #   tags: "LLM,TEXT EMBEDDING,SPEECH2TEXT,MODERATION"
    #   status: "1"
    #   llm:
    #     - llm_name: my-custom-llm
    #       tags: "LLM,CHAT,"
    #       max_tokens: 100000
    #       model_type: chat
    #       is_tools: false

  # Kubernetes configuration
  deployment:
    strategy:
    resources:
  service:
    # Use LoadBalancer to expose the web interface externally
    type: ClusterIP
  api:
    service:
      enabled: true
      type: ClusterIP

  admin:
    service:
      enabled: true
      type: ClusterIP
  mcp:
    service:
      enabled: false
      type: ClusterIP

elasticsearch:
  image:
    repository: elasticsearch
    tag: "8.11.3"
    pullPolicy: IfNotPresent
    pullSecrets: []
  initContainers:
    alpine:
      repository: alpine
      tag: latest
      pullPolicy: IfNotPresent
    busybox:
      repository: busybox
      tag: latest
      pullPolicy: IfNotPresent
  storage:
    className:
    capacity: 20Gi
  deployment:
    strategy:
    resources:
      requests:
        cpu: "4"
        memory: "16Gi"
      limits:
        cpu: "8" 
        memory: "32Gi"
  service:
    type: ClusterIP

minio:
  enabled: true
  image:
    repository: quay.io/minio/minio
    tag: RELEASE.2023-12-20T01-00-02Z
    pullPolicy: IfNotPresent
    pullSecrets: []
  storage:
    className:
    capacity: 5Gi
  deployment:
    strategy:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
  service:
    type: ClusterIP

mysql:
  enabled: false # Using external Cloud SQL

redis:
  enabled: true
  image:
    repository: valkey/valkey
    tag: 8
    pullPolicy: IfNotPresent
    pullSecrets: []
  storage:
    className:
    capacity: 5Gi
  persistence:
    enabled: true
    # Set's the retention policy for the persistent storage (only available in k8s 1.32 or later)
    # https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
    # retentionPolicy:
      # whenDeleted: Delete
      # whenScaled: Delete
  deployment:
    strategy:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
  service:
    type: ClusterIP


# This block is for setting up web service ingress. For more information, see:
# https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: ragflow.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
