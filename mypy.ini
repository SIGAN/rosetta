[mypy]
python_version = 3.12
strict = True
files = tools, ims-mcp-server/ims_mcp, ims-mcp-server/validation
exclude = (?x)(^tools/venv/|^tools/tests/|^ims-mcp-server/tests/|^ims-mcp-server/dist/|^ims-mcp-server/ims_mcp\.egg-info/|/__pycache__/|/\.pytest_cache/)
show_error_codes = True
pretty = True
ignore_missing_imports = True
disable_error_code = import-not-found, import-untyped, no-untyped-call, untyped-decorator, has-type, misc
