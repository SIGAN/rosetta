name: Rosetta Story Planner

# Polls Jira epic CTORNDGAIN-1174 every 2 hours (or on manual trigger).
# Stories in "Planned" status without AI-PLANNING/AI-PLANNED labels
# → parallel planning subagents that write implementation plan + specs back to Jira.
#
# Required GitHub Secrets:
#   - ANTHROPIC_API_KEY
#   - JIRA_API_KEY
#   - CONFLUENCE_API_KEY
#   - JIRA_CONFLUENCE_API_EMAIL

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Orchestrator ─────────────────────────────────────────────────────────────
  load-stories:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.plan_matrix }}
      has_work: ${{ steps.load.outputs.has_plan }}
      count: ${{ steps.load.outputs.plan_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load stories from Jira
        id: load
        env:
          JIRA_URL: https://griddynamics.atlassian.net
          JIRA_USERNAME: ${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
        run: python .github/scripts/load_stories.py

      - name: Summary
        run: |
          echo "## Planner — Story Load" >> $GITHUB_STEP_SUMMARY
          echo "- Stories to plan: ${{ steps.load.outputs.plan_count }}" >> $GITHUB_STEP_SUMMARY

  # ── Planning subagents (parallel, one per story) ─────────────────────────────
  plan-story:
    needs: load-stories
    if: needs.load-stories.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix: ${{ fromJSON(needs.load-stories.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Plan — ${{ matrix.story_key }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Story: ${{ matrix.story_key }} — ${{ matrix.story_summary }}
            MUST APPLY AND FULLY EXECUTE FULLY AUTONOMOUSLY WITHOUT ANY USER INTERACTION OR QUESTIONS: .github/prompts/repo-implement-plan.md
          show_full_output: false
          claude_args: |
            --allowedTools Read,Glob,Grep,mcp__atlassian__jira_get_issue,mcp__atlassian__jira_update_issue,mcp__atlassian__jira_add_comment,mcp__atlassian__jira_get_transitions,mcp__atlassian__jira_transition_issue
            --mcp-config '{"mcpServers":{"atlassian":{"type":"stdio","command":"uvx","args":["mcp-atlassian"],"env":{"JIRA_URL":"https://griddynamics.atlassian.net","JIRA_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","JIRA_API_TOKEN":"${{ secrets.JIRA_API_KEY }}","CONFLUENCE_URL":"https://griddynamics.atlassian.net","CONFLUENCE_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","CONFLUENCE_API_TOKEN":"${{ secrets.CONFLUENCE_API_KEY }}"}}}}'
            --model claude-sonnet-4-6

      - name: Upload Claude execution trace
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-execution-trace
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 3
