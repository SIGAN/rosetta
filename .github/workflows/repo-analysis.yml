name: Rosetta Repo Analysis

# Runs nightly at 01:00 UTC or on manual trigger.
# Loads Jira stories under epic CTORNDGAIN-1174, reviews the codebase for improvements,
# and creates/updates stories automatically using Claude + Atlassian MCP.
#
# Required GitHub Secrets:
#   - ANTHROPIC_API_KEY: Claude API key
#   - JIRA_API_KEY: Atlassian API token
#   - CONFLUENCE_API_KEY: Atlassian API token (Confluence)
#   - JIRA_CONFLUENCE_API_EMAIL: Atlassian account email for API auth

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "MUST APPLY AND FULLY EXECUTE FULLY AUTONOMOUSLY WITHOUT ANY USER INTERACTION OR QUESTIONS: .github/prompts/repo-analysis.md"
          show_full_output: false
          claude_args: >-
            --allowedTools
            "Read,Glob,Grep,mcp__atlassian__jira_search,mcp__atlassian__jira_get_issue,mcp__atlassian__jira_create_issue,mcp__atlassian__jira_update_issue,mcp__atlassian__confluence_get_page,mcp__atlassian__confluence_update_page,mcp__atlassian__confluence_search,mcp__Rosetta__get_context_instructions,mcp__Rosetta__list_instructions,mcp__Rosetta__query_instructions,mcp__Rosetta__query_project_context"
            --mcp-config
            '{"mcpServers":{"atlassian":{"type":"stdio","command":"uvx","args":["mcp-atlassian"],"env":{"JIRA_URL":"${{ secrets.JIRA_URL }}","JIRA_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","JIRA_API_TOKEN":"${{ secrets.JIRA_API_KEY }}","CONFLUENCE_URL":"${{ secrets.CONFLUENCE_URL }}","CONFLUENCE_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","CONFLUENCE_API_TOKEN":"${{ secrets.CONFLUENCE_API_KEY }}"}},"Rosetta":{"type":"stdio","command":"uvx","args":["--prerelease=allow","ims-mcp@latest"],"env":{"ROSETTA_SERVER_URL":"${{ secrets.RAGFLOW_BASE_URL }}","ROSETTA_API_KEY":"${{ secrets.RAGFLOW_API_KEY }}","ROSETTA_USER_EMAIL":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","VERSION":"r2"}}}}'
            --model claude-sonnet-4-6

      - name: Upload Claude execution trace
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-execution-trace
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 3
