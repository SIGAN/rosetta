name: Rosetta Story Implementer

# Polls Jira epic CTORNDGAIN-1174 every 4 hours (or on manual trigger).
# Stories in "Selected for Development" without AI-IMPLEMENTING/AI-IMPLEMENTED labels
# → parallel implementation subagents that create a branch, write code, and open a PR.
#
# Required GitHub Secrets:
#   - ANTHROPIC_API_KEY
#   - JIRA_API_KEY
#   - CONFLUENCE_API_KEY
#   - JIRA_CONFLUENCE_API_EMAIL

on:
  schedule:
#    - cron: '0 */4 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ── Orchestrator ─────────────────────────────────────────────────────────────
  load-stories:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.impl_matrix }}
      has_work: ${{ steps.load.outputs.has_impl }}
      count: ${{ steps.load.outputs.impl_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load stories from Jira
        id: load
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
        run: python .github/scripts/load_stories.py

      - name: Summary
        run: |
          echo "## Implementer — Story Load" >> $GITHUB_STEP_SUMMARY
          echo "- Stories to implement: ${{ steps.load.outputs.impl_count }}" >> $GITHUB_STEP_SUMMARY

  # ── Implementation subagents (parallel, one per story) ────────────────────────
  implement-story:
    needs: load-stories
    if: needs.load-stories.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write

    strategy:
      matrix: ${{ fromJSON(needs.load-stories.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Bun
        id: bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Implement — ${{ matrix.story_key }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_bun_executable: ${{ steps.bun.outputs.bun-path }}
          prompt: |
            Story: ${{ matrix.story_key }} — ${{ matrix.story_summary }}
            MUST APPLY AND FULLY EXECUTE FULLY AUTONOMOUSLY WITHOUT ANY USER INTERACTION OR QUESTIONS, No HITL: .github/prompts/repo-implement-code.md
          show_full_output: false
          claude_args: |
            --allowedTools Read,Write,Edit,MultiEdit,Glob,Grep,Bash(*),mcp__atlassian__jira_get_issue,mcp__atlassian__jira_update_issue,mcp__atlassian__jira_add_comment,mcp__atlassian__jira_edit_comment,mcp__atlassian__jira_add_remote_link,mcp__atlassian__jira_get_issue_development_info,mcp__atlassian__jira_create_issue_link,mcp__atlassian__jira_get_link_types,mcp__atlassian__jira_get_transitions,mcp__atlassian__jira_transition_issue,mcp__Rosetta__get_context_instructions,mcp__Rosetta__list_instructions,mcp__Rosetta__query_instructions,mcp__Rosetta__query_project_context,mcp__Rosetta__store_project_context
            --mcp-config '{"mcpServers":{"atlassian":{"type":"stdio","command":"uvx","args":["mcp-atlassian"],"env":{"JIRA_URL":"${{ secrets.JIRA_URL }}","JIRA_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","JIRA_API_TOKEN":"${{ secrets.JIRA_API_KEY }}","CONFLUENCE_URL":"${{ secrets.CONFLUENCE_URL }}","CONFLUENCE_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","CONFLUENCE_API_TOKEN":"${{ secrets.CONFLUENCE_API_KEY }}"}},"Rosetta":{"type":"stdio","command":"uvx","args":["--prerelease=allow","ims-mcp@latest"],"env":{"ROSETTA_SERVER_URL":"${{ secrets.RAGFLOW_BASE_URL }}","ROSETTA_API_KEY":"${{ secrets.RAGFLOW_API_KEY }}","ROSETTA_USER_EMAIL":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","VERSION":"r2"}}}}'
            --model claude-sonnet-4-6

      - name: Upload Claude execution trace
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-execution-trace-${{ matrix.story_key }}
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 3
